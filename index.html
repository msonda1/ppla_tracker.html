<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0c0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Strength Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600&display=swap');

:root{
  --bg:#0c0e14;
  --surface:#13161f;
  --surface2:#1a1e2a;
  --surface3:#232838;
  --border:#252a38;
  --border-bright:#353b4f;

  /* PPLA accents (blue / gold heritage) */
  --ppla-accent:#4a9eff;
  --ppla-accent-dim:#2e6cbb;
  --ppla-bg:rgba(74,158,255,0.08);

  /* Home / Garage PPLA accents (amber - forged barbell aesthetic) */
  --home-accent:#f5a623;
  --home-accent-dim:#b87a17;
  --home-bg:rgba(245,166,35,0.08);

  /* Garage Flex accents (green for A / plum for B) */
  --garage-accent:#3ecf7a;
  --garage-accent-dim:#2a8f54;
  --garage-bg:rgba(62,207,122,0.08);
  --garage-b-accent:#c96fff;
  --garage-b-accent-dim:#8a4ab0;
  --garage-b-bg:rgba(201,111,255,0.08);

  --text:#dde3f0;
  --text-dim:#9ba3b8;
  --muted:#606880;
  --white:#ffffff;
  --success:#3ecf7a;
  --warning:#f5a623;
  --danger:#ff6b6b;
  --top:#ffd700;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  line-height:1.45;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body.program-ppla{ --accent:var(--ppla-accent); --accent-dim:var(--ppla-accent-dim); --accent-bg:var(--ppla-bg); }
body.program-home{ --accent:var(--home-accent); --accent-dim:var(--home-accent-dim); --accent-bg:var(--home-bg); }
body.program-garage{ --accent:var(--garage-accent); --accent-dim:var(--garage-accent-dim); --accent-bg:var(--garage-bg); }

/* HEADER */
.app-header{
  position:sticky;top:0;z-index:40;
  background:rgba(12,14,20,0.94);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 18px 0;
}
.app-header .title-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.app-header h1{
  font-family:'DM Mono',monospace;
  font-size:13px;font-weight:500;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--white);
}
.app-header .subtitle{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted);
  letter-spacing:0.08em;margin-top:2px;
}
.header-right{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.08em;text-align:right}

/* PROGRAM TOGGLE */
.program-toggle{
  display:flex;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:3px;margin-bottom:0;
}
.program-toggle button{
  flex:1;background:transparent;border:none;color:var(--muted);
  padding:9px 12px;font-family:'DM Mono',monospace;font-size:11px;
  font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;border-radius:6px;transition:all 0.18s;
}
.program-toggle button.active{
  color:var(--white);
}
body.program-ppla .program-toggle button.active{ background:rgba(74,158,255,0.18); }
body.program-home .program-toggle button.active{ background:rgba(245,166,35,0.18); }
body.program-garage .program-toggle button.active{ background:rgba(62,207,122,0.18); }

.toggle-divider{height:14px}

/* VIEWS */
.view{display:none;padding:18px 18px calc(110px + env(safe-area-inset-bottom, 0px))}
.view.active{display:block}

/* SECTION HEADERS */
.section-header{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:0.14em;color:var(--muted);
  text-transform:uppercase;margin:18px 0 10px;
  display:flex;justify-content:space-between;align-items:baseline;
}
.section-header:first-child{margin-top:4px}
.section-header .meta{color:var(--text-dim)}

/* STAT CARD (Dashboard top) */
.stat-card{
  background:linear-gradient(140deg, var(--surface2), var(--surface));
  border:1px solid var(--border);border-radius:14px;
  padding:20px 18px;margin-bottom:14px;
}
.stat-card .big-number{
  font-family:'DM Sans',sans-serif;font-size:42px;font-weight:700;
  color:var(--white);letter-spacing:-0.02em;line-height:1;
}
.stat-card .big-number .unit{font-size:14px;color:var(--text-dim);margin-left:6px;font-weight:500}
.stat-card .stat-label{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:0.14em;text-transform:uppercase;margin-top:6px;
}
.stat-card .stat-detail{font-size:12px;color:var(--text-dim);margin-top:10px}
.stat-card .stat-detail strong{color:var(--text);font-weight:600}

.dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.dashboard-grid .mini-stat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px;
}
.mini-stat .v{font-size:22px;font-weight:700;color:var(--white)}
.mini-stat .l{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px}

/* DAY CARD GRID */
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.day-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 12px;cursor:pointer;
  transition:all 0.18s;
}
.day-card:active{transform:scale(0.97)}
.day-card .day-tag{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;
  color:var(--muted);text-transform:uppercase;
}
.day-card .day-name{font-size:16px;font-weight:600;color:var(--white);margin-top:4px}
.day-card .day-desc{font-size:11px;color:var(--text-dim);margin-top:3px}
.day-card .day-sets{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
  margin-top:8px;letter-spacing:0.06em;
}

/* category accent bars */
.day-card.cat-push{border-left:3px solid #4a9eff}
.day-card.cat-pull{border-left:3px solid #3ecf7a}
.day-card.cat-legs{border-left:3px solid #f5a623}
.day-card.cat-arms{border-left:3px solid #c96fff}
.day-card.cat-flexa{border-left:3px solid #3ecf7a}
.day-card.cat-flexb{border-left:3px solid #c96fff}

/* RECENT WORKOUT ROW (Dashboard / History) */
.workout-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;
  margin-bottom:8px;cursor:pointer;transition:background 0.15s;
}
.workout-row:active{background:var(--surface2)}
.workout-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.cat-push{background:#4a9eff}
.dot.cat-pull,.dot.cat-flexa{background:#3ecf7a}
.dot.cat-legs{background:#f5a623}
.dot.cat-arms,.dot.cat-flexb{background:#c96fff}

.workout-row .wr-main{flex:1;min-width:0}
.workout-row .wr-name{font-size:14px;font-weight:600;color:var(--text)}
.workout-row .wr-prog{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;
  color:var(--muted);text-transform:uppercase;margin-right:6px;
  padding:1px 5px;border:1px solid var(--border-bright);border-radius:3px;
}
.workout-row .wr-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:0.04em}
.workout-row .wr-vl{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--white)}
.workout-row .wr-vl small{font-size:9px;color:var(--muted);margin-left:2px;letter-spacing:0.08em}

/* WORKOUT DETAIL VIEW */
.workout-detail-header{margin-bottom:18px}
.back-link{
  display:inline-flex;align-items:center;gap:4px;
  color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.08em;background:none;border:none;cursor:pointer;
  padding:0;margin-bottom:14px;
}
.workout-detail-header .wd-name{font-size:24px;font-weight:700;color:var(--white)}
.workout-detail-header .wd-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px}

.summary-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:18px;
}
.summary-block .sb-vl{
  text-align:center;
  font-size:34px;font-weight:700;color:var(--white);
  letter-spacing:-0.01em;
}
.summary-block .sb-vl-label{
  text-align:center;
  font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);
  letter-spacing:0.16em;text-transform:uppercase;margin-top:4px;
}
.summary-block hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.summary-block .sb-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}
.summary-block .sb-row .lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase}
.summary-block .sb-row .val{color:var(--text);font-weight:500}

.ex-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;margin-bottom:10px;overflow:hidden;
}
.ex-block.tappable{cursor:pointer}
.ex-block-header{
  padding:13px 14px;display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:1px solid var(--border);
}
.ex-block-header .ex-name{font-size:14px;font-weight:600;color:var(--text)}
.ex-block-header .ex-scheme{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.06em}
.ex-block-header .ex-vl{text-align:right;flex-shrink:0;margin-left:8px}
.ex-block-header .ex-vl .num{font-family:'DM Mono',monospace;font-size:14px;color:var(--white);font-weight:500}
.ex-block-header .ex-vl .lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.12em;display:block;margin-top:1px}
.ex-block-header .ex-arrow{color:var(--muted);font-size:14px;margin-left:6px;opacity:0.5}

.set-row{
  display:flex;align-items:center;padding:10px 14px;
  border-bottom:1px solid rgba(37,42,56,0.5);
  font-family:'DM Mono',monospace;
}
.set-row:last-child{border-bottom:none}
.set-row .set-num{color:var(--muted);font-size:11px;width:24px}
.set-row .set-tag{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:8px;letter-spacing:0.12em;font-weight:600;margin-right:8px}
.set-row .set-tag.top{background:rgba(255,215,0,0.14);color:var(--top);border:1px solid rgba(255,215,0,0.3)}
.set-row .set-tag.lp{background:rgba(62,207,122,0.14);color:var(--success);border:1px solid rgba(62,207,122,0.3)}
.set-row .set-data{flex:1;text-align:right;font-size:13px;color:var(--text)}
.set-row .set-data .x{color:var(--muted);margin:0 3px;font-size:11px}
.set-row .set-vl{font-size:13px;color:var(--text);width:60px;text-align:right;margin-left:14px}

/* ACTIVE WORKOUT */
.exercise-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-bottom:12px;
}
.exercise-card .ec-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.exercise-card .ec-name{font-size:15px;font-weight:600;color:var(--text)}
.exercise-card .ec-scheme{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.08em;margin-top:2px}
.exercise-card .ec-badges{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
.exercise-card .badge{
  font-family:'DM Mono',monospace;font-size:8px;padding:3px 6px;
  border-radius:3px;letter-spacing:0.12em;font-weight:600;
}
.badge.top{background:rgba(255,215,0,0.14);color:var(--top);border:1px solid rgba(255,215,0,0.3)}
.badge.lp{background:rgba(62,207,122,0.14);color:var(--success);border:1px solid rgba(62,207,122,0.3)}

/* LAST + BEST reference */
.exercise-last-session{
  position:relative;
  margin-top:10px;padding:10px 28px 10px 12px;
  background:var(--accent-bg);
  border:1px solid var(--accent-dim);
  border-radius:6px;cursor:pointer;
  font-family:'DM Mono',monospace;transition:all 0.15s;
}
.exercise-last-session:hover,.exercise-last-session:active{filter:brightness(1.15)}
.els-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;line-height:1.3}
.els-row:last-child{margin-bottom:0}
.els-row .lbl{font-size:8px;letter-spacing:0.14em;color:var(--muted);font-weight:600;flex-shrink:0;width:38px}
.els-row .data{color:var(--text);font-size:12px;font-weight:500;flex:1;min-width:0;word-break:break-word}
.els-row .data .set-token{white-space:nowrap}
.els-row .data .set-token.top{color:var(--top)}
.els-row .data .pr{color:var(--success)}
.els-row .data .pr-vl{color:#f5a623;font-weight:600}
.els-row .meta{color:var(--muted);font-size:9px;letter-spacing:0.04em;white-space:nowrap;flex-shrink:0}
.els-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);opacity:0.5;font-size:14px}

/* set input rows */
.set-input-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-top:1px solid rgba(37,42,56,0.5);
  font-family:'DM Mono',monospace;
}
.set-input-row .si-num{color:var(--muted);font-size:11px;width:18px;flex-shrink:0}
.set-input-row input{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  font-family:'DM Mono',monospace;font-size:14px;padding:8px 10px;
  border-radius:6px;width:70px;text-align:center;
  -webkit-appearance:none;appearance:none;
}
.set-input-row input:focus{outline:none;border-color:var(--accent);background:var(--surface3)}
.set-input-row .x{color:var(--muted);font-size:12px}
.set-input-row .si-vl{flex:1;text-align:right;color:var(--text-dim);font-size:12px;padding-right:6px}
.set-input-row .si-tag-btns{display:flex;gap:4px}
.set-input-row .tag-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:9px;padding:5px 7px;
  border-radius:4px;cursor:pointer;font-weight:600;letter-spacing:0.06em;
}
.set-input-row .tag-btn.active.top{background:rgba(255,215,0,0.2);color:var(--top);border-color:var(--top)}
.set-input-row .tag-btn.active.lp{background:rgba(62,207,122,0.2);color:var(--success);border-color:var(--success)}

.add-set-btn,.session-btn{
  width:100%;padding:11px;background:transparent;
  border:1px dashed var(--border-bright);color:var(--text-dim);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.1em;
  border-radius:6px;cursor:pointer;margin-top:8px;text-transform:uppercase;
}
.add-set-btn:active{background:var(--surface2)}

.add-exercise-btn{
  width:100%;padding:14px;background:transparent;
  border:1.5px dashed var(--accent-dim);color:var(--accent);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;
  border-radius:8px;cursor:pointer;margin-top:14px;text-transform:uppercase;
  font-weight:600;
}
.add-exercise-btn:active{background:var(--accent-bg)}

/* Volume counter at top of active workout */
.vol-counter{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;margin-bottom:14px;
}
.vol-counter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.vol-counter-label{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);
  letter-spacing:0.16em;text-transform:uppercase;
}
.vol-counter-data{font-family:'DM Mono',monospace;font-size:12px;color:var(--text)}
.vol-counter-data strong{color:var(--white);font-size:14px;font-weight:600}
.vol-counter-bar{
  height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;
}
.vol-counter-fill{
  height:100%;border-radius:3px;transition:width 0.3s ease, background 0.3s ease;
}
.counter-good .vol-counter-fill{background:var(--success)}
.counter-warn .vol-counter-fill{background:var(--warning)}
.counter-over .vol-counter-fill{background:var(--danger)}
.counter-warn .vol-counter-data strong{color:var(--warning)}
.counter-over .vol-counter-data strong{color:var(--danger)}
.counter-over{border-color:var(--danger);background:rgba(255,107,107,0.05)}

/* Best-day indicator on session counter */
.vol-counter-best{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;padding-top:8px;
  border-top:1px solid var(--border);
}
.vc-best-label{
  font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);
  letter-spacing:0.14em;text-transform:uppercase;font-weight:600;
}
.vc-best-data{
  font-family:'DM Mono',monospace;font-size:11px;color:#f5a623;font-weight:600;
}

/* ============================================
   CHART VIEW
============================================ */
.chart-header{
  margin-bottom:16px;
}
.chart-controls{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:16px;
}
.chart-control-row{
  display:flex;gap:6px;flex-wrap:wrap;
}
.chart-pill{
  flex:1;min-width:0;padding:9px 6px;
  background:transparent;border:1px solid var(--border-bright);
  color:var(--text-dim);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  border-radius:6px;cursor:pointer;
  white-space:nowrap;text-align:center;
}
.chart-pill.active{
  background:var(--accent-bg);border-color:var(--accent);color:var(--accent);
}
.chart-pill:active{background:var(--surface2)}
.chart-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:16px;
}
.chart-stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px;text-align:center;
}
.chart-stat-val{
  font-family:'DM Mono',monospace;font-size:16px;color:var(--white);
  font-weight:600;line-height:1;margin-bottom:4px;
}
.chart-stat-lbl{
  font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);
  letter-spacing:0.12em;text-transform:uppercase;
}
.chart-canvas-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px 10px;margin-bottom:16px;
  position:relative;
}
.chart-canvas-wrap svg{display:block;width:100%;height:auto}
.chart-legend{
  display:flex;flex-wrap:wrap;gap:14px;justify-content:center;
  margin-top:10px;font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text-dim);
}
.chart-legend-item{display:flex;align-items:center;gap:5px}
.chart-legend-dot{width:9px;height:9px;border-radius:50%}
.chart-empty{
  padding:40px 20px;text-align:center;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;
}
.chart-best-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:8px;
}
.chart-best-card .cb-name{
  font-size:12px;color:var(--text);font-weight:600;margin-bottom:4px;
}
.chart-best-card .cb-data{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);
  display:flex;justify-content:space-between;
}
.chart-best-card .cb-vl{color:#f5a623;font-weight:600}
.chart-section-title{
  font-size:11px;color:var(--text-dim);font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;
  margin:20px 0 10px;
}

/* PR Badge banner on workout detail (best session ever) */
.pr-badge-banner{
  background:linear-gradient(135deg, rgba(245,166,35,0.15), rgba(245,166,35,0.05));
  border:1px solid rgba(245,166,35,0.4);
  border-radius:8px;padding:11px 14px;margin-bottom:14px;
  font-family:'DM Mono',monospace;font-size:11px;
  color:#f5a623;letter-spacing:0.08em;font-weight:600;
  text-align:center;
}

/* Exercise skip/remove buttons */
.ex-action-btn{
  background:transparent;border:1px solid var(--border-bright);
  color:var(--muted);font-size:14px;width:30px;height:30px;

.ex-action-btn:active{background:var(--surface2);color:var(--text)}

.exercise-card.skipped{opacity:0.5;border-style:dashed}
.exercise-card.skipped .ec-name{text-decoration:line-through}
.skipped-banner{
  margin-top:10px;padding:8px 12px;
  background:var(--surface2);border-radius:6px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text-dim);text-align:center;letter-spacing:0.08em;
}

/* Custom exercise badge */
.badge.custom{
  background:rgba(245,166,35,0.14);color:var(--warning);
  border:1px solid rgba(245,166,35,0.3);
}

.session-actions{
  display:flex;gap:10px;

}
.session-actions .session-btn{margin-top:0}
.session-btn.finish{
  background:var(--success);color:#0a1a10;border:none;font-weight:700;
  border-style:solid;
}
.session-btn.cancel{
  background:transparent;color:var(--danger);border:1px solid var(--danger);
}

/* notes textarea */
.notes-block{margin-top:14px}
.notes-block label{
  display:block;font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;
  margin-bottom:6px;
}
.notes-block textarea{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;
  padding:10px 12px;border-radius:6px;resize:vertical;min-height:60px;
}
.notes-block textarea:focus{outline:none;border-color:var(--accent)}

/* Reference view */
.ref-program-block{margin-bottom:24px}
.ref-program-title{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--white);
  margin-bottom:10px;
}
.ref-day-card{
  background:var(--surface);border:1px solid var(--border);

}
.ref-day-card .ref-day-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ref-day-card .ref-day-name{font-size:15px;font-weight:600;color:var(--text)}
.ref-day-card .ref-day-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.12em}
.ref-ex-line{

.ref-ex-line .ref-ex-scheme{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}

.settings-row button{

.bottom-nav{

.bottom-nav button{

.bottom-nav button.active{color:var(--accent)}

.toast{

.toast.show{opacity:1}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:none;align-items:center;justify-content:center;z-index:90;
  padding:20px;

.modal-overlay.show{display:flex}
.modal{

.modal h3{font-size:16px;margin-bottom:8px;color:var(--white)}
.modal p{font-size:13px;color:var(--text-dim);margin-bottom:16px}
.modal .modal-actions{display:flex;gap:10px}
.modal .modal-actions button{

.modal .modal-actions .confirm{background:var(--danger);color:#fff;border:none}
.modal .modal-actions .cancel{background:transparent;color:var(--text);border:1px solid var(--border-bright)}

/* ============================================
   STATE
============================================ */
let state = {
  program: 'ppla',
  workouts: [],
  active: null,
  view: 'dashboard',
  prevView: null,
  detailId: null,
  progressionExName: null,
  progressionReturnView: 'detail',
  chartFilter: 'all',
  chartRange: 30
};

const STORAGE_KEY = 'strength_tracker_v2';

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      if(d.workouts) state.workouts = d.workouts;
      if(d.program) state.program = d.program;
    }
    // Also try legacy PPLA tracker key
    const legacy = localStorage.getItem('ppla_tracker_v1');
    if(legacy && state.workouts.length === 0){
      const ld = JSON.parse(legacy);
      if(ld.workouts){
        state.workouts = ld.workouts.map(w => ({...w, program: w.program || 'ppla'}));
        toast('Imported existing PPLA data');
        save();
      }
    }
  }catch(e){console.warn('Load error',e)}
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version:2,
      program:state.program,
      workouts:state.workouts
    }));
  }catch(e){console.warn('Save error',e)}
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
function fmtDateShort(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
}
function timeAgo(iso){
  const now=new Date();
  const then=new Date(iso);
  const days=Math.round((now-then)/(1000*60*60*24));
  if(days===0) return 'today';
  if(days===1) return 'yesterday';
  if(days<7) return days+'d ago';
  if(days<30) return Math.round(days/7)+'w ago';
  return Math.round(days/30)+'mo ago';
}
function fmtVL(n){
  if(n>=10000) return (n/1000).toFixed(1)+'k';
  return n.toLocaleString();
}

function switchProgram(p){
  if(state.active){
    if(!confirm('You have an active workout. Switching programs will not affect it, but the toggle changes which program views show. Continue?')) return;
  }
  state.program = p;
  document.body.className = 'program-'+p;
  document.getElementById('btn-ppla').classList.toggle('active', p==='ppla');

/* ============================================
   HISTORY HELPERS
============================================ */
function getProgramWorkouts(program){
  return state.workouts.filter(w => (w.program||'ppla') === program);
}
function getExerciseHistory(name, program){
  const out = [];
  for(const w of state.workouts){
    if(program && (w.program||'ppla') !== program) continue;
    for(const ex of (w.exercises||[])){
      if(ex.name === name && ex.sets && ex.sets.length){
        out.push({date:w.date, workoutName:w.name, sets:ex.sets});
      }
    }
  }
  return out.sort((a,b)=>new Date(b.date)-new Date(a.date));
}
function getExerciseBest(name, program){
  const history = getExerciseHistory(name, program);
  let bestW=0, bestR=0;
  history.forEach(h => h.sets.forEach(s => {
    if(s.weight > bestW){ bestW = s.weight; bestR = s.reps; }
    else if(s.weight === bestW && s.reps > bestR){ bestR = s.reps; }
  }));
  return bestW > 0 ? {weight:bestW, reps:bestR} : null;
}

// Best session volume for a specific exercise (sum of VL across one session, best across all sessions)
function getExerciseBestVL(name, program){
  const history = getExerciseHistory(name, program);
  let bestVL = 0, bestDate = null;
  history.forEach(h => {
    const sessionVL = h.sets.reduce((sum, s) => sum + (s.vl || s.weight * s.reps), 0);
    if(sessionVL > bestVL){
      bestVL = sessionVL;
      bestDate = h.date;
    }
  });
  return bestVL > 0 ? {vl: bestVL, date: bestDate} : null;
}

// Best total session volume for a specific day type (e.g. all H-Push A sessions)
function getDayTypeBestVL(dayKey, program){
  let bestVL = 0, bestDate = null;
  for(const w of state.workouts){
    if(w.dayKey !== dayKey) continue;
    if((w.program||'ppla') !== program) continue;
    const sessionVL = w.exercises.reduce((sum, ex) =>
      sum + ex.sets.reduce((s2, s) => s2 + (s.vl || s.weight * s.reps), 0), 0);
    if(sessionVL > bestVL){
      bestVL = sessionVL;
      bestDate = w.date;
    }
  }
  return bestVL > 0 ? {vl: bestVL, date: bestDate} : null;
}

// Compute session total VL for current active workout
function getSessionTotalVL(workout){
  return workout.exercises.reduce((sum, ex) =>
    sum + ex.sets.reduce((s2, s) => s2 + (s.vl || (s.weight && s.reps ? s.weight * s.reps : 0)), 0), 0);
}

============================================ */
function startWorkout(dayKey){
  if(state.active){
    if(!confirm('You have an active workout in progress. Discard it?')) return;
  }
  const dayDef = PROGRAMS[state.program].days[dayKey];
  state.active = {
    program: state.program,
    dayKey,
    dayDef,
    startedAt: new Date().toISOString(),
    exercises: dayDef.exercises.map(ex => ({
      name: ex.name,
      scheme: ex.scheme,
      top: ex.top || false,
      lp: ex.lp || false,
      sets: [{weight:'', reps:'', isTop:false, isLPLast:false}]
    })),
    notes: ''
  };
  renderActive();
  showView('active');
}

function resumeActive(){
  if(!state.active) return;
  renderActive();
  showView('active');
}

function renderActive(){
  if(!state.active) return;
  const a = state.active;
  const cap = a.dayDef.totalSets || 22;

  // Count completed (non-skipped) sets across all exercises
  let loggedSets = 0;
  let loggedVL = 0;
  a.exercises.forEach(ex => {
    if(ex.skipped) return;
    ex.sets.forEach(s => {
      if(s.weight !== '' && s.reps !== '' && s.weight > 0 && s.reps > 0){
        loggedSets++;
        loggedVL += parseFloat(s.weight) * parseInt(s.reps);
      }
    });
  });

  const pct = Math.min(100, Math.round((loggedSets / cap) * 100));
  let counterClass = 'counter-good';
  if(loggedSets >= cap) counterClass = 'counter-over';
  else if(loggedSets >= cap - 2) counterClass = 'counter-warn';

  // Best total VL for this day type
  const dayBest = getDayTypeBestVL(a.dayKey, a.program);
  const dayBestHTML = dayBest
    ? `<div class="vol-counter-best">
         <span class="vc-best-label">BEST ${a.dayDef.name}</span>
         <span class="vc-best-data">${fmtVL(dayBest.vl)} lb · ${new Date(dayBest.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
       </div>`
    : '';

  let html = `
    <button class="back-link" type="button" data-action="cancel-active">← Cancel</button>
    <div class="workout-detail-header" style="margin-bottom:14px">
      <div class="wd-name">${a.dayDef.name}</div>
      <div class="wd-date">In progress · started ${new Date(a.startedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
    </div>

    <div class="vol-counter ${counterClass}">
      <div class="vol-counter-row">
        <span class="vol-counter-label">SESSION VOLUME</span>
        <span class="vol-counter-data"><strong>${loggedSets}</strong> / ${cap} sets · ${fmtVL(loggedVL)} lb</span>
      </div>
      <div class="vol-counter-bar"><div class="vol-counter-fill" style="width:${pct}%"></div></div>
      ${dayBestHTML}
    </div>
  `;

  a.exercises.forEach((ex, exIdx) => {
    html += renderExerciseCard(ex, exIdx);
  });

  html += `
    <button class="add-exercise-btn" type="button" data-action="add-exercise">+ Add Exercise</button>
    <div class="notes-block">
      <label>Notes</label>
      <textarea id="active-notes" placeholder="Equipment changes, RPE, anything worth remembering..." data-input="notes">${a.notes||''}</textarea>
    </div>
    <div class="session-actions">
      <button class="session-btn cancel" type="button" data-action="cancel-active">Cancel</button>
      <button class="session-btn finish" type="button" data-action="finish-active">Finish Session</button>
    </div>
  `;

  document.getElementById('view-active').innerHTML = html;
}

function renderExerciseCard(ex, exIdx){
  const history = getExerciseHistory(ex.name, state.active.program);
  let lastHTML = '';
  if(history.length){
    const last = history[0];
    const tokens = last.sets.map(s=>{
      const cls = s.isTop ? 'set-token top' : 'set-token';
      return `<span class="${cls}">${s.weight}×${s.reps}</span>`;
    }).join(' <span style="color:var(--muted)">·</span> ');

    const best = getExerciseBest(ex.name, state.active.program);
    const bestHTML = best
      ? `<div class="els-row">
           <span class="lbl">BEST</span>
           <span class="data"><span class="pr">${best.weight} × ${best.reps}</span></span>
         </div>`
      : '';

    const bestVL = getExerciseBestVL(ex.name, state.active.program);
    const bestVLHTML = bestVL
      ? `<div class="els-row">
           <span class="lbl">BEST VL</span>
           <span class="data"><span class="pr-vl">${fmtVL(bestVL.vl)} lb</span></span>
         </div>`
      : '';

    lastHTML = `
      <div class="exercise-last-session" data-action="open-progression" data-ex-name="${encodeURIComponent(ex.name)}" data-return="active">
        <div class="els-row">
          <span class="lbl">LAST</span>
          <span class="data">${tokens}</span>
          <span class="meta">${timeAgo(last.date)}</span>
        </div>
        ${bestHTML}
        ${bestVLHTML}

  }

  let badgesHTML = '';
  if(ex.top) badgesHTML += '<span class="badge top">TOP</span>';
  if(ex.lp) badgesHTML += '<span class="badge lp">LP</span>';
  if(ex.custom) badgesHTML += '<span class="badge custom">CUSTOM</span>';

  let setsHTML = '';
  ex.sets.forEach((s, sIdx)=>{
    setsHTML += `
      <div class="set-input-row">
        <div class="si-num">${sIdx+1}</div>
        <input type="number" inputmode="decimal" placeholder="lb" value="${s.weight}" data-input="set-weight" data-ex-idx="${exIdx}" data-set-idx="${sIdx}">
        <span class="x">×</span>
        <input type="number" inputmode="numeric" placeholder="reps" value="${s.reps}" data-input="set-reps" data-ex-idx="${exIdx}" data-set-idx="${sIdx}">
        <div class="si-vl">${s.weight && s.reps ? (s.weight*s.reps).toLocaleString()+' lb' : ''}</div>
        <div class="si-tag-btns">
          ${ex.top ? `<button class="tag-btn ${s.isTop?'active top':''}" data-action="toggle-top" data-ex-idx="${exIdx}" data-set-idx="${sIdx}">TOP</button>` : ''}
          ${ex.lp ? `<button class="tag-btn ${s.isLPLast?'active lp':''}" data-action="toggle-lp" data-ex-idx="${exIdx}" data-set-idx="${sIdx}">LP</button>` : ''}
          ${ex.sets.length > 1 ? `<button class="tag-btn" data-action="remove-set" data-ex-idx="${exIdx}" data-set-idx="${sIdx}" style="color:var(--danger);border-color:var(--danger)">×</button>` : ''}
        </div>
      </div>
    `;
  });

  const skipBtn = ex.custom
    ? `<button class="ex-action-btn" type="button" data-action="remove-exercise" data-ex-idx="${exIdx}" title="Delete">✕</button>`
    : `<button class="ex-action-btn" type="button" data-action="toggle-skip" data-ex-idx="${exIdx}" title="${ex.skipped?'Restore':'Skip'}">${ex.skipped?'↶':'⊘'}</button>`;

  const cardClass = ex.skipped ? 'exercise-card skipped' : 'exercise-card';

  return `
    <div class="${cardClass}">
      <div class="ec-header">
        <div style="flex:1;min-width:0">
          <div class="ec-name">${ex.name}</div>
          <div class="ec-scheme">${ex.scheme}</div>
        </div>
        <div class="ec-badges">${badgesHTML}</div>
        ${skipBtn}
      </div>
      ${ex.skipped ? '<div class="skipped-banner">Skipped — tap ↶ to restore</div>' : lastHTML + setsHTML + `<button class="add-set-btn" data-action="add-set" data-ex-idx="${exIdx}">+ Add Set</button>`}
    </div>
  `;
}

function updateSet(exIdx, sIdx, field, val){
  const v = val === '' ? '' : parseFloat(val);
  state.active.exercises[exIdx].sets[sIdx][field] = isNaN(v) ? '' : v;
  // Update VL display in place without full re-render
  const rows = document.querySelectorAll('.exercise-card')[exIdx].querySelectorAll('.set-input-row');
  const row = rows[sIdx];
  const s = state.active.exercises[exIdx].sets[sIdx];
  const vlEl = row.querySelector('.si-vl');
  if(s.weight && s.reps){
    vlEl.textContent = (s.weight*s.reps).toLocaleString()+' lb';
  } else {
    vlEl.textContent = '';
  }
  // Update session volume counter in place
  updateVolumeCounter();
}

function updateVolumeCounter(){
  if(!state.active) return;
  const a = state.active;
  const cap = a.dayDef.totalSets || 22;
  let loggedSets = 0, loggedVL = 0;
  a.exercises.forEach(ex => {
    if(ex.skipped) return;
    ex.sets.forEach(s => {
      if(s.weight !== '' && s.reps !== '' && s.weight > 0 && s.reps > 0){
        loggedSets++;
        loggedVL += parseFloat(s.weight) * parseInt(s.reps);
      }
    });
  });
  const counter = document.querySelector('.vol-counter');
  if(!counter) return;
  const pct = Math.min(100, Math.round((loggedSets / cap) * 100));
  counter.classList.remove('counter-good', 'counter-warn', 'counter-over');
  if(loggedSets >= cap) counter.classList.add('counter-over');
  else if(loggedSets >= cap - 2) counter.classList.add('counter-warn');
  else counter.classList.add('counter-good');
  const dataEl = counter.querySelector('.vol-counter-data');
  if(dataEl) dataEl.innerHTML = `<strong>${loggedSets}</strong> / ${cap} sets · ${fmtVL(loggedVL)} lb`;
  const fillEl = counter.querySelector('.vol-counter-fill');
  if(fillEl) fillEl.style.width = pct + '%';
}
function toggleTag(exIdx, sIdx, field){
  const sets = state.active.exercises[exIdx].sets;
  // For isTop and isLPLast, only one per exercise
  if(field === 'isTop'){
    sets.forEach((s,i)=>{ if(i!==sIdx) s.isTop = false; });
  }
  if(field === 'isLPLast'){
    sets.forEach((s,i)=>{ if(i!==sIdx) s.isLPLast = false; });
  }
  sets[sIdx][field] = !sets[sIdx][field];
  renderActive();
}
function addSet(exIdx){
  state.active.exercises[exIdx].sets.push({weight:'', reps:'', isTop:false, isLPLast:false});
  renderActive();
}
function removeSet(exIdx, sIdx){
  state.active.exercises[exIdx].sets.splice(sIdx, 1);
  renderActive();
}

function addExercise(){
  if(!state.active) return;
  const name = prompt('Exercise name:\n(e.g. "Upright Row", "Cable Pull-Through", "Pec Deck")');
  if(!name || !name.trim()) return;

  const scheme = prompt('Set/rep scheme:\n(e.g. "3×10-12", "4×8", or just press OK)') || 'custom';

  state.active.exercises.push({
    name: name.trim(),
    scheme: scheme.trim() || 'custom',
    top: false,
    lp: false,
    custom: true,
    sets: [{weight:'', reps:'', isTop:false, isLPLast:false}]
  });
  renderActive();
  // Scroll to the newly added exercise
  setTimeout(()=>{
    const cards = document.querySelectorAll('.exercise-card');
    if(cards.length){
      cards[cards.length-1].scrollIntoView({behavior:'smooth', block:'center'});
    }
  }, 50);
}

function removeExercise(exIdx){
  if(!state.active) return;
  const ex = state.active.exercises[exIdx];
  if(!confirm(`Delete "${ex.name}" from this workout?`)) return;
  state.active.exercises.splice(exIdx, 1);
  renderActive();
}

function toggleSkip(exIdx){
  if(!state.active) return;
  state.active.exercises[exIdx].skipped = !state.active.exercises[exIdx].skipped;
  renderActive();
}

function cancelActive(){
  if(!confirm('Discard this workout? Your in-progress data will be lost.')) return;
  state.active = null;
  navTo('dashboard');
}
function finishActive(){
  const a = state.active;
  // Build clean workout record
  const workout = {
    id: 'w_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    program: a.program,
    dayKey: a.dayKey,
    name: a.dayDef.name,
    category: a.dayDef.category,
    date: new Date().toISOString(),
    startedAt: a.startedAt,
    notes: a.notes||'',
    exercises: a.exercises
      .filter(ex => !ex.skipped)
      .map(ex => ({
        name: ex.name,
        scheme: ex.scheme,
        top: ex.top,
        lp: ex.lp,
        custom: ex.custom || false,
        sets: ex.sets
          .filter(s => s.weight !== '' && s.reps !== '' && s.weight > 0 && s.reps > 0)
          .map(s => ({
            weight: parseFloat(s.weight),
            reps: parseInt(s.reps),
            isTop: !!s.isTop,
            isLPLast: !!s.isLPLast,
            vl: parseFloat(s.weight) * parseInt(s.reps)
          }))
      })).filter(ex => ex.sets.length > 0)
  };
  workout.totalVL = workout.exercises.reduce((s,ex)=>s+ex.sets.reduce((a,set)=>a+set.vl,0), 0);

  if(workout.exercises.length === 0){
    alert('No completed sets logged. Add at least one set before finishing.');
    return;
  }

  state.workouts.push(workout);
  state.active = null;
  save();
  toast('Workout saved');
  state.detailId = workout.id;
  showView('detail');
  renderDetail();
  navUpdate('history');
}
function navUpdate(view){
  document.querySelectorAll('.bottom-nav button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===view);
  });
}

/* ============================================
   PROGRESSION VIEW
============================================ */
function openProgression(exName, from){
  state.progressionExName = exName;
  state.progressionReturnView = from || 'detail';
  showView('progression');
  renderProgression();
}
function renderProgression(){
  const name = state.progressionExName;
  // Find which program this exercise typically belongs to
  // Show all sessions for that exercise from current program filter
  const history = getExerciseHistory(name, state.program);
  if(history.length === 0){
    // Try other programs
    const allHistory = getExerciseHistory(name);
    if(allHistory.length > 0){
      // Render from all programs
      return renderProgressionWithData(name, allHistory);
    }
  }
  renderProgressionWithData(name, history);
}
function renderProgressionWithData(name, history){
  const best = (() => {
    let bw=0, br=0, date='';
    history.forEach(h => h.sets.forEach(s => {
      if(s.weight > bw){ bw=s.weight; br=s.reps; date=h.date; }
      else if(s.weight === bw && s.reps > br){ br=s.reps; date=h.date; }
    }));
    return bw > 0 ? {weight:bw, reps:br, date} : null;
  })();

  const totalSessions = history.length;
  const totalSets = history.reduce((s,h)=>s+h.sets.length, 0);
  const totalVL = history.reduce((s,h)=>s+h.sets.reduce((a,set)=>a+(set.weight*set.reps),0), 0);

  let html = `
    <button class="back-link" data-action="back-from-progression">← Back</button>
    <div class="workout-detail-header">
      <div class="wd-name" style="font-size:20px">${name}</div>
      <div class="wd-date">Progression · ${totalSessions} session${totalSessions===1?'':'s'}</div>
    </div>

    <div class="prog-stats">
      <div class="ps-grid">
        <div>
          <div class="v ps-pr">${best ? best.weight+'×'+best.reps : '—'}</div>
          <div class="l">All-Time Best</div>
        </div>
        <div>
          <div class="v">${totalSets}</div>
          <div class="l">Total Sets</div>
        </div>
        <div>
          <div class="v">${fmtVL(totalVL)}</div>
          <div class="l">Total VL · LB</div>
        </div>
      </div>
    </div>
  `;

  // Sparkline chart (top set weight over time)
  if(history.length >= 2){
    html += renderSparkline(history);
  }

  html += `<div class="section-header">All Sessions</div>`;
  history.forEach(h => {
    const tokens = h.sets.map(s=>{
      let cls = 'set-token';
      if(s.isTop) cls = 'set-token top';
      else if(s.isLPLast) cls = 'set-token lp';
      return `<span class="${cls}">${s.weight}×${s.reps}</span>`;
    }).join('<span class="sep"> · </span>');
    html += `
      <div class="session-list-item">
        <div class="sli-date">${fmtDate(h.date)} · ${h.workoutName.toUpperCase()}</div>
        <div class="sli-sets">${tokens}</div>
      </div>
    `;
  });

  if(history.length === 0){
    html += `<div class="empty-state">No history yet for this exercise.</div>`;
  }

  document.getElementById('view-progression').innerHTML = html;
}

function renderSparkline(history){
  // Take heaviest set per session, plot weight over time
  const data = history.slice().reverse().map(h => {
    let topW = 0, topR = 0;
    h.sets.forEach(s => {
      if(s.weight > topW){ topW = s.weight; topR = s.reps; }
    });
    return {date: h.date, weight: topW, reps: topR};
  });

  const W = 320, H = 100, P = 12;
  const weights = data.map(d=>d.weight);
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const range = max - min || 1;
  const stepX = data.length > 1 ? (W - 2*P) / (data.length - 1) : 0;

  let pathD = '';
  let points = '';
  data.forEach((d,i) => {
    const x = P + i*stepX;
    const y = H - P - ((d.weight - min) / range) * (H - 2*P);
    pathD += (i===0 ? `M${x},${y}` : ` L${x},${y}`);
    points += `<circle cx="${x}" cy="${y}" r="3" fill="var(--accent)"/>`;
  });

  return `
    <div class="prog-stats" style="padding:14px 8px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;padding:0 6px 6px">Heaviest Set Trend</div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100px;display:block">
        <path d="${pathD}" stroke="var(--accent)" stroke-width="2" fill="none"/>
        ${points}
      </svg>
      <div style="display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding:0 6px;margin-top:4px">
        <span>${fmtDateShort(data[0].date)} · ${data[0].weight} lb</span>
        <span>${fmtDateShort(data[data.length-1].date)} · ${data[data.length-1].weight} lb</span>
      </div>
    </div>
  `;
}

function renderChart(){
  const filter = state.chartFilter || 'all';

    date: new Date(w.date),
    vl: getSessionTotalVL(w),
    program: w.program || 'ppla',
    name: w.name,
    dayKey: w.dayKey,
    id: w.id
  }));

  // Stats
  const totalVL = points.reduce((sum, p) => sum + p.vl, 0);
  const avgVL = points.length ? Math.round(totalVL / points.length) : 0;
  const maxVL = points.length ? Math.max(...points.map(p => p.vl)) : 0;

  let html = `
    <div class="chart-header">
      <div class="section-header">Volume Progression <span class="meta">${points.length} sessions</span></div>
    </div>

    <div class="chart-controls">
      <div class="chart-control-row">
        <button class="chart-pill ${filter==='all'?'active':''}" type="button" data-action="chart-filter" data-filter="all">All</button>
        <button class="chart-pill ${filter==='ppla'?'active':''}" type="button" data-action="chart-filter" data-filter="ppla">PPLA</button>
        <button class="chart-pill ${filter==='home'?'active':''}" type="button" data-action="chart-filter" data-filter="home">Home</button>
        <button class="chart-pill ${filter==='garage'?'active':''}" type="button" data-action="chart-filter" data-filter="garage">Flex</button>
      </div>
      <div class="chart-control-row">
        <button class="chart-pill ${range===7?'active':''}" type="button" data-action="chart-range" data-range="7">7d</button>
        <button class="chart-pill ${range===30?'active':''}" type="button" data-action="chart-range" data-range="30">30d</button>
        <button class="chart-pill ${range===90?'active':''}" type="button" data-action="chart-range" data-range="90">90d</button>
        <button class="chart-pill ${range===0?'active':''}" type="button" data-action="chart-range" data-range="0">All</button>
      </div>
    </div>
  `;

  if(points.length === 0){
    html += `<div class="chart-empty">No sessions in this window.<br>Try a longer range or remove the filter.</div>`;
    document.getElementById('view-chart').innerHTML = html;
    return;
  }

  // Stats cards
  html += `
    <div class="chart-stats">
      <div class="chart-stat-card">
        <div class="chart-stat-val">${fmtVL(totalVL)}</div>
        <div class="chart-stat-lbl">Total lb</div>
      </div>
      <div class="chart-stat-card">
        <div class="chart-stat-val">${fmtVL(avgVL)}</div>
        <div class="chart-stat-lbl">Avg / session</div>
      </div>
      <div class="chart-stat-card">
        <div class="chart-stat-val">${fmtVL(maxVL)}</div>
        <div class="chart-stat-lbl">Peak session</div>
      </div>
    </div>
  `;

  html += `<div class="chart-canvas-wrap">${buildVolumeChartSVG(points)}</div>`;

  const programs = [...new Set(points.map(p => p.program))];
  if(programs.length > 1 || filter === 'all'){
    html += `<div class="chart-legend">`;
    if(points.some(p => p.program === 'ppla')) html += `<div class="chart-legend-item"><span class="chart-legend-dot" style="background:#4a9eff"></span>PPLA</div>`;
    if(points.some(p => p.program === 'home')) html += `<div class="chart-legend-item"><span class="chart-legend-dot" style="background:#f5a623"></span>Home</div>`;
    if(points.some(p => p.program === 'garage')) html += `<div class="chart-legend-item"><span class="chart-legend-dot" style="background:#3ecf7a"></span>Garage Flex</div>`;
    html += `</div>`;
  }

  // Best per day type (across all programs in current filter)
  const dayTypeBests = {};
  workouts.forEach(w => {
    const key = (w.program||'ppla') + '|' + w.dayKey + '|' + w.name;
    const vl = getSessionTotalVL(w);
    if(!dayTypeBests[key] || vl > dayTypeBests[key].vl){
      dayTypeBests[key] = {name: w.name, program: w.program||'ppla', vl, date: w.date};
    }
  });
  const dayTypeList = Object.values(dayTypeBests).sort((a,b)=>b.vl-a.vl);

  if(dayTypeList.length){
    html += `<div class="chart-section-title">Best Session by Day Type</div>`;
    dayTypeList.forEach(d => {

function buildVolumeChartSVG(points){
  if(!points.length) return '';

  const W = 340, H = 200;
  const padL = 36, padR = 12, padT = 14, padB = 28;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const vls = points.map(p => p.vl);
  const minVL = 0;
  const maxVL = Math.max(...vls) * 1.1;
  const dates = points.map(p => p.date.getTime());
  const minD = Math.min(...dates);
  const maxD = Math.max(...dates);
  const dRange = maxD - minD || 1;

  const xFor = d => padL + (plotW * ((d - minD) / dRange));
  const yFor = v => padT + plotH - (plotH * ((v - minVL) / (maxVL - minVL || 1)));

  // Y-axis grid lines and labels (4 ticks)
  let grid = '';
  let yLabels = '';
  for(let i = 0; i <= 4; i++){
    const v = minVL + ((maxVL - minVL) * i / 4);
    const y = yFor(v);
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#252a38" stroke-width="0.5"/>`;
    const lbl = v >= 1000 ? (v/1000).toFixed(1)+'k' : Math.round(v);
    yLabels += `<text x="${padL-4}" y="${y+3}" text-anchor="end" font-size="9" fill="#606880" font-family="DM Mono,monospace">${lbl}</text>`;
  }

  // X-axis labels (start, middle, end dates)
  let xLabels = '';
  const dateLabel = ts => {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  };
  xLabels += `<text x="${padL}" y="${H-8}" text-anchor="start" font-size="9" fill="#606880" font-family="DM Mono,monospace">${dateLabel(minD)}</text>`;
  if(points.length > 2){
    xLabels += `<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="9" fill="#606880" font-family="DM Mono,monospace">${dateLabel((minD+maxD)/2)}</text>`;
  }
  xLabels += `<text x="${W-padR}" y="${H-8}" text-anchor="end" font-size="9" fill="#606880" font-family="DM Mono,monospace">${dateLabel(maxD)}</text>`;

  // Build line path (connecting all points in order)
  let pathD = '';
  points.forEach((p, i) => {
    const x = xFor(p.date.getTime());
    const y = yFor(p.vl);
    pathD += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  });

  // Build colored dots for each point
  const colorFor = prog => prog === 'home' ? '#f5a623' : prog === 'garage' ? '#3ecf7a' : '#4a9eff';
  let dots = '';
  points.forEach(p => {
    const x = xFor(p.date.getTime());
    const y = yFor(p.vl);
    dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="${colorFor(p.program)}" stroke="#0c0e14" stroke-width="1.5"/>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" aria-label="Volume progression chart">
    ${grid}
    ${yLabels}
    ${xLabels}
    <path d="${pathD}" stroke="#9ba3b8" stroke-width="1.2" fill="none" opacity="0.4"/>
    ${dots}
  </svg>`;
}

/* ============================================

function renderReference(){
  const prog = PROGRAMS[state.program];
  let html = `<div class="ref-program-title">${prog.name}</div>`;

  for(const [key, day] of Object.entries(prog.days)){
    html += `
      <div class="ref-day-card">
        <div class="ref-day-head">
          <div class="ref-day-name">${day.name}</div>
          <div class="ref-day-tag">${day.tag}</div>
        </div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${day.desc}</div>
    `;
    day.exercises.forEach(ex => {
      let tags = '';
      if(ex.top) tags += ' <span style="color:var(--top);font-size:9px">[TOP]</span>';
      if(ex.lp) tags += ' <span style="color:var(--success);font-size:9px">[LP]</span>';
      html += `
        <div class="ref-ex-line">
          <span>${ex.name}${tags}</span>
          <span class="ref-ex-scheme">${ex.scheme}</span>
        </div>
      `;
    });
    html += `</div>`;
  }

  if(state.program === 'home'){
    html += `
      <div class="ref-program-title" style="margin-top:24px">Home Program Notes</div>
      <div class="ref-day-card">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
          • <strong style="color:var(--text)">Use when:</strong> Training in garage instead of work gym or PF<br>
          • <strong style="color:var(--text)">Substitutes for:</strong> Match H-Push A to PPLA Push A, H-Pull A to Pull A, etc.<br>
          • <strong style="color:var(--text)">Tracks separately:</strong> BB Bench vs DB Bench have different PRs<br>
          • <strong style="color:var(--text)">Equipment used:</strong> Rack + bench + Ohio bar + plates + GHD + ab roller + StrongNeck bar + heavy bag + landmine + Matador dip + dip belt
        </div>
      </div>
      <div class="ref-program-title" style="margin-top:18px">Landmine + Dip Protocol</div>
      <div class="ref-day-card">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
          <strong style="color:var(--text)">Weighted Dip (H-Push A):</strong><br>
          • Start: bodyweight × 6-8 reps for 3 sets<br>
          • Add belt weight: 25 lb when 3×8 clean<br>
          • Progress: TOP set 3-5 reps + 2 working sets 6-8 reps<br><br>

          <strong style="color:var(--text)">Meadows Row landmine (H-Pull A):</strong><br>
          • Start: 45-65 lb on bar end<br>
          • 3×8-10/side, RPE 7-8<br>
          • Stagger stance, elbow drives back &amp; up<br><br>

          <strong style="color:var(--text)">Single-Arm Landmine Press (H-Push B):</strong><br>
          • Start: 45-50 lb<br>
          • 2×10-12/side, RPE 7-8<br>
          • Standing or half-kneeling — keep moderate, lateral delt focus<br><br>

          <strong style="color:var(--text)">Landmine Russian Twist (H-Pull A):</strong><br>
          • Start: just the bar (45 lb)<br>
          • 2×12-15/side, RPE 6-7 — anti-rotation focus, not max strength<br>
          • Keep arms extended, rotate from hips not shoulders
        </div>
      </div>
      <div class="ref-program-title" style="margin-top:18px">Barbell PR Targets</div>
      <div class="ref-day-card">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
          Starting estimates from DB→BB conversion (Saeterbakken):<br>
          • Incline BB Bench: ~265-290 lb 1RM (from 75 DB×10)<br>
          • Flat BB Bench: ~285-315 lb 1RM (300+ historical)<br>
          • BB Back Squat: progress conservatively, RPE 8 cap<br>
          • Pull-Up (weighted): start bodyweight, add weight when 8+ clean reps
        </div>
      </div>
    `;
  }

  if(state.program === 'garage'){
    html += `
      <div class="ref-program-title" style="margin-top:24px">Frequency Guardrails</div>
      <div class="ref-day-card">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
          • Baseline: alternate A / B each PPLA cycle (1 per 8-day cycle)<br>
          • Aggressive: both per cycle — only after 14+ days Green HRV, min 48h apart<br>
          • Never 3 in a row · Never back-to-back · Never within 24h of Legs A/B<br>
          • Flex A slots best Day 4 → Day 5 · Flex B slots Day 7 → Day 8
        </div>
      </div>
      <div class="ref-program-title" style="margin-top:18px">3-Week Rotation</div>
      <div class="ref-day-card">
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6">
          Each session cycles through 3 weekly variants (Wk 1 → Wk 2 → Wk 3 → Wk 1...).<br>
          • Posterior: GHR → Nordic → Razor Curl<br>
          • Anterior: GHD Situp → Weighted Situp → Situp w/Twist<br>
          Pick the right week based on where you are in the rotation.
        </div>
      </div>
    `;
  }

  document.getElementById('view-reference').innerHTML = html;
}

/* ============================================
   SETTINGS
============================================ */
function renderSettings(){
  const total = state.workouts.length;
  const ppla = getProgramWorkouts('ppla').length;
  const garage = getProgramWorkouts('garage').length;
  document.getElementById('view-settings').innerHTML = `
    <div class="settings-section">
      <div class="section-header">Data</div>
      <div class="settings-row">
        <div>
          <div class="sr-label">Workouts Stored</div>
          <div class="sr-meta">${total} total · ${ppla} PPLA · ${garage} Garage</div>
        </div>
      </div>
      <div class="settings-row">
        <div>
          <div class="sr-label">Export JSON</div>
          <div class="sr-meta">Backup all workouts to file</div>
        </div>
        <button data-action="export">Export</button>
      </div>
      <div class="settings-row">
        <div>
          <div class="sr-label">Import JSON</div>
          <div class="sr-meta">Restore from a backup file</div>
        </div>
        <button data-action="trigger-import">Import</button>
      </div>
    </div>
    <div class="settings-section">
      <div class="section-header">Storage</div>
      <div class="settings-row">
        <div>
          <div class="sr-label">Clear All Data</div>
          <div class="sr-meta">Wipes localStorage. Export first.</div>
        </div>
        <button class="danger" data-action="clear-all">Wipe</button>
      </div>
    </div>
    <div style="text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.14em;margin-top:32px;line-height:1.7">
      STRENGTH TRACKER · v2.0<br>
      DATA SAVED LOCALLY ON THIS DEVICE
    </div>
  `;
}

function exportData(){
  const data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    workouts: state.workouts
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `strength-tracker-backup-${ts}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Exported');
}

function importData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const data = JSON.parse(e.target.result);
      if(!data.workouts || !Array.isArray(data.workouts)){
        alert('Invalid backup file: missing workouts array.');
        return;
      }
      // Merge strategy: keep existing, add new IDs only
      const existingIds = new Set(state.workouts.map(w=>w.id));
      let added = 0, skipped = 0;
      data.workouts.forEach(w => {
        if(existingIds.has(w.id)){
          skipped++;
          return;
        }
        // Ensure program field for backward compat (PPLA v1 export had no program field)
        if(!w.program) w.program = 'ppla';
        // Ensure id (older exports might not have it)
        if(!w.id) w.id = 'w_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
        state.workouts.push(w);
        added++;
      });
      save();
      toast(`Imported ${added} workouts${skipped ? ' · skipped '+skipped+' dupes' : ''}`);
      render();
    } catch(err){
      console.error(err);
      alert('Failed to parse backup file: '+err.message);
    }
  };
  reader.readAsText(file);
}

function clearAll(){
  if(!confirm('Wipe ALL workouts? This cannot be undone. Export first if you want a backup.')) return;
  if(!confirm('Really sure? This deletes everything.')) return;
  state.workouts = [];
  state.active = null;
  save();
  toast('All data cleared');
  navTo('dashboard');
}

/* ============================================
   MAIN RENDER
============================================ */
function render(){
  // Update header
  const prog = PROGRAMS[state.program];
  document.getElementById('program-title').textContent = prog.name+' · LOAD TRACKER';
  document.getElementById('program-subtitle').textContent = prog.subtitle;
  document.getElementById('header-cycle').textContent = prog.cycle;

  switch(state.view){
    case 'dashboard': renderDashboard(); break;
    case 'train': renderTrain(); break;
    case 'history': renderHistory(); break;
    case 'chart': renderChart(); break;
    case 'reference': renderReference(); break;
    case 'settings': renderSettings(); break;
    case 'active': renderActive(); break;
    case 'detail': renderDetail(); break;
    case 'progression': renderProgression(); break;
  }
}

/* ============================================
   INIT
============================================ */
load();
document.body.className = 'program-'+state.program;
document.getElementById('btn-ppla').classList.toggle('active', state.program==='ppla');
document.getElementById('btn-home').classList.toggle('active', state.program==='home');
document.getElementById('btn-garage').classList.toggle('active', state.program==='garage');
document.getElementById('import-file').addEventListener('change', e => {
  if(e.target.files && e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }

/* ============================================
   GLOBAL EVENT DELEGATION (CSP-safe)
   All UI events route through here via data-action / data-input attributes.
   This survives innerHTML re-renders and works in CSP-restricted environments.
============================================ */
document.addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  try{
    switch(action){
      case 'nav': navTo(t.dataset.view); break;
      case 'program': switchProgram(t.dataset.program); break;
      case 'resume-active': resumeActive(); break;
      case 'cancel-active': cancelActive(); break;
      case 'finish-active': finishActive(); break;
      case 'back-from-detail': navBackFromDetail(); break;
      case 'back-from-progression': navBackFromProgression(); break;
      case 'start-workout': startWorkout(t.dataset.key); break;
      case 'open-detail': openDetail(t.dataset.id); break;
      case 'delete-workout': deleteWorkout(t.dataset.id); break;
      case 'open-progression':
        openProgression(decodeURIComponent(t.dataset.exName), t.dataset.return);
        break;
      case 'add-set': addSet(parseInt(t.dataset.exIdx)); break;
      case 'remove-set':
        removeSet(parseInt(t.dataset.exIdx), parseInt(t.dataset.setIdx));
        break;
      case 'toggle-top':
        toggleTag(parseInt(t.dataset.exIdx), parseInt(t.dataset.setIdx), 'isTop');
        break;
      case 'toggle-lp':
        toggleTag(parseInt(t.dataset.exIdx), parseInt(t.dataset.setIdx), 'isLPLast');
        break;
      case 'add-exercise': addExercise(); break;
      case 'remove-exercise': removeExercise(parseInt(t.dataset.exIdx)); break;
      case 'toggle-skip': toggleSkip(parseInt(t.dataset.exIdx)); break;
      case 'export': exportData(); break;
      case 'clear-all': clearAll(); break;
      case 'close-modal': closeModal(); break;
      case 'trigger-import': document.getElementById('import-file').click(); break;
      case 'chart-filter':
        state.chartFilter = t.dataset.filter;
        save();
        renderChart();
        break;
      case 'chart-range':
        state.chartRange = parseInt(t.dataset.range);
        save();
        renderChart();
        break;
      default: console.warn('Unknown action:', action);
    }
  } catch(err){
    console.error('Action handler error:', action, err);
    alert('Something went wrong: ' + err.message + '\n\nPlease screenshot this and report. Your data is saved.');
  }
});

document.addEventListener('input', function(e){
  const t = e.target.closest('[data-input]');
  if(!t) return;
  const kind = t.dataset.input;
  try{
    if(kind === 'notes' && state.active){
      state.active.notes = t.value;
    } else if(kind === 'set-weight'){
      updateSet(parseInt(t.dataset.exIdx), parseInt(t.dataset.setIdx), 'weight', t.value);
    } else if(kind === 'set-reps'){
      updateSet(parseInt(t.dataset.exIdx), parseInt(t.dataset.setIdx), 'reps', t.value);
    }
  } catch(err){
    console.error('Input handler error:', kind, err);
  }
});

render();

</script>

</html>
